<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1c1b1a" />
    <title>L'Émission de Minuit</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1c1b1a;
        --on-air: #c8102e;
        --yellow: #ffd23f;
        --cream: #f4e9d8;
        --magenta: #e63da2;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--cream);
        font-family: 'Courier New', 'Consolas', monospace;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        cursor: default;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      /* Hidden webcam video element used as MediaPipe input. */
      #webcam-video {
        position: fixed;
        bottom: 0;
        right: 0;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <video id="webcam-video" autoplay playsinline muted></video>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
